name: Release on Ubuntu

# GitHub Actions workflow for building and packaging RadarSimPy on Ubuntu platforms.
#
# This workflow builds RadarSimPy across multiple Ubuntu LTS versions and Python versions.
# It supports Ubuntu 22.04 LTS, Ubuntu 24.04 LTS, and Ubuntu 26.04 LTS to provide
# comprehensive Linux coverage with different GCC compiler versions.
#
# Build Matrix:
# - Defined once, as JSON, in the `setup` job's "Define build matrix" step.
#   The `build`, `pack-artifacts`, and `build-summary` jobs all consume it via
#   job outputs, so adding/removing an Ubuntu version or Python version only
#   requires editing that one step — no other job needs to change.
# - Ubuntu 22.04 LTS: GCC-11 compiler, 5 builds (5 Python versions)
# - Ubuntu 24.04 LTS: GCC-13 compiler, 5 builds (5 Python versions)
# - Ubuntu 26.04 LTS: GCC-15 compiler, 5 builds (5 Python versions)
# - Python versions: 3.10, 3.11, 3.12, 3.13, 3.14
# - Total builds: 15
#
# Features:
# - Comprehensive caching (pip, ccache)
# - Build optimization with ccache
# - System dependency management
# - Artifact verification and validation
# - Multi-version artifact packing
# - Detailed build reporting and summaries
# - Error handling with build log uploads
# - Ubuntu-specific optimizations
#
# Outputs:
# - Individual artifacts for each build configuration
# - Packed archive containing all builds organized by Ubuntu version
# - Build summaries and statistics
#
# Triggers:
# - Tag pushes (release events)
# - Manual workflow dispatch

on:
  push:
    tags:
      - "*"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

env:
  # Global environment variables
  PYTHONUNBUFFERED: 1
  PYTHONDONTWRITEBYTECODE: 1

jobs:
  # Single source of truth for the build matrix. Every other job reads this
  # instead of hardcoding Ubuntu versions/Python versions.
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Define build matrix
        id: set-matrix
        run: |
          cat > matrix.json << 'EOF'
          [
            { "os": "ubuntu-22.04", "python-version": "3.10", "c_compiler": "gcc-11", "cxx_compiler": "g++-11", "arch": "cpu", "ubuntu_version": "22", "artifact_name": "radarsimpy_ubuntu_22_04_py3.10" },
            { "os": "ubuntu-22.04", "python-version": "3.11", "c_compiler": "gcc-11", "cxx_compiler": "g++-11", "arch": "cpu", "ubuntu_version": "22", "artifact_name": "radarsimpy_ubuntu_22_04_py3.11" },
            { "os": "ubuntu-22.04", "python-version": "3.12", "c_compiler": "gcc-11", "cxx_compiler": "g++-11", "arch": "cpu", "ubuntu_version": "22", "artifact_name": "radarsimpy_ubuntu_22_04_py3.12" },
            { "os": "ubuntu-22.04", "python-version": "3.13", "c_compiler": "gcc-11", "cxx_compiler": "g++-11", "arch": "cpu", "ubuntu_version": "22", "artifact_name": "radarsimpy_ubuntu_22_04_py3.13" },
            { "os": "ubuntu-22.04", "python-version": "3.14", "c_compiler": "gcc-11", "cxx_compiler": "g++-11", "arch": "cpu", "ubuntu_version": "22", "artifact_name": "radarsimpy_ubuntu_22_04_py3.14" },
            { "os": "ubuntu-24.04", "python-version": "3.10", "c_compiler": "gcc-13", "cxx_compiler": "g++-13", "arch": "cpu", "ubuntu_version": "24", "artifact_name": "radarsimpy_ubuntu_24_04_py3.10" },
            { "os": "ubuntu-24.04", "python-version": "3.11", "c_compiler": "gcc-13", "cxx_compiler": "g++-13", "arch": "cpu", "ubuntu_version": "24", "artifact_name": "radarsimpy_ubuntu_24_04_py3.11" },
            { "os": "ubuntu-24.04", "python-version": "3.12", "c_compiler": "gcc-13", "cxx_compiler": "g++-13", "arch": "cpu", "ubuntu_version": "24", "artifact_name": "radarsimpy_ubuntu_24_04_py3.12" },
            { "os": "ubuntu-24.04", "python-version": "3.13", "c_compiler": "gcc-13", "cxx_compiler": "g++-13", "arch": "cpu", "ubuntu_version": "24", "artifact_name": "radarsimpy_ubuntu_24_04_py3.13" },
            { "os": "ubuntu-24.04", "python-version": "3.14", "c_compiler": "gcc-13", "cxx_compiler": "g++-13", "arch": "cpu", "ubuntu_version": "24", "artifact_name": "radarsimpy_ubuntu_24_04_py3.14" },
            { "os": "ubuntu-26.04", "python-version": "3.10", "c_compiler": "gcc-15", "cxx_compiler": "g++-15", "arch": "cpu", "ubuntu_version": "26", "artifact_name": "radarsimpy_ubuntu_26_04_py3.10" },
            { "os": "ubuntu-26.04", "python-version": "3.11", "c_compiler": "gcc-15", "cxx_compiler": "g++-15", "arch": "cpu", "ubuntu_version": "26", "artifact_name": "radarsimpy_ubuntu_26_04_py3.11" },
            { "os": "ubuntu-26.04", "python-version": "3.12", "c_compiler": "gcc-15", "cxx_compiler": "g++-15", "arch": "cpu", "ubuntu_version": "26", "artifact_name": "radarsimpy_ubuntu_26_04_py3.12" },
            { "os": "ubuntu-26.04", "python-version": "3.13", "c_compiler": "gcc-15", "cxx_compiler": "g++-15", "arch": "cpu", "ubuntu_version": "26", "artifact_name": "radarsimpy_ubuntu_26_04_py3.13" },
            { "os": "ubuntu-26.04", "python-version": "3.14", "c_compiler": "gcc-15", "cxx_compiler": "g++-15", "arch": "cpu", "ubuntu_version": "26", "artifact_name": "radarsimpy_ubuntu_26_04_py3.14" }
          ]
          EOF
          echo "matrix=$(jq -c . matrix.json)" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ssh-key: ${{secrets.RADARSIMC}}
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Cache build dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.ccache
          key: ${{ runner.os }}-${{ matrix.os }}-${{ matrix.python-version }}-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.os }}-${{ matrix.python-version }}-
            ${{ runner.os }}-${{ matrix.os }}-

      - name: Install system dependencies
        run: |
          # Update package lists
          sudo apt-get update

          # Install ccache for faster compilation
          sudo apt-get install -y ccache
          echo "/usr/lib/ccache" >> $GITHUB_PATH

          # Set up ccache
          ccache --set-config=max_size=2G
          ccache --set-config=cache_dir=~/.ccache

          # Install build dependencies
          sudo apt-get install -y build-essential

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -r requirements-dev.txt

      - name: Display build information
        run: |
          echo "::group::Build Information"
          echo "OS: ${{ matrix.os }}"
          echo "Python: ${{ matrix.python-version }}"
          echo "Architecture: ${{ matrix.arch }}"
          echo "C Compiler: ${{ matrix.c_compiler }}"
          echo "C++ Compiler: ${{ matrix.cxx_compiler }}"
          echo "::endgroup::"

          echo "::group::System Information"
          uname -a
          lsb_release -a
          python --version
          pip --version
          ${{ matrix.c_compiler }} --version
          ${{ matrix.cxx_compiler }} --version
          echo "::endgroup::"

      - name: Build RadarSimPy
        env:
          CC: ${{ matrix.c_compiler }}
          CXX: ${{ matrix.cxx_compiler }}
          CCACHE_DIR: ~/.ccache
          CCACHE_COMPILERCHECK: content
        run: |
          echo "::group::Build Process"
          sudo chown -R $USER:$USER /home/runner/work/radarsimpy
          chmod +x build.sh
          ./build.sh --license=on --arch=${{ matrix.arch }} --test=off --verbose
          echo "::endgroup::"

      - name: Display build statistics
        if: always()
        run: |
          echo "::group::Build Statistics"
          ccache --show-stats
          echo "::endgroup::"

      - name: Verify build artifacts
        run: |
          echo "::group::Build Verification"
          ls -la ./radarsimpy/
          if [ -f "./radarsimpy/__init__.py" ]; then
            echo "✓ Python module found"
          else
            echo "✗ Python module missing"
            exit 1
          fi

          # Check for compiled extensions
          if find ./radarsimpy -name "*.so" -o -name "*.dylib" -o -name "*.pyd" | grep -q .; then
            echo "✓ Compiled extensions found:"
            find ./radarsimpy -name "*.so" -o -name "*.dylib" -o -name "*.pyd"
          else
            echo "✗ No compiled extensions found"
            exit 1
          fi
          echo "::endgroup::"

      - name: Archive built module
        uses: actions/upload-artifact@v6
        if: success()
        with:
          name: ${{ matrix.artifact_name }}
          path: ./radarsimpy
          retention-days: 1
          compression-level: 6

      - name: Upload build logs on failure
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: build-logs-${{ matrix.artifact_name }}
          path: |
            ./build_logs/
            *.log
          retention-days: 1

  # Pack all artifacts into a single file
  pack-artifacts:
    needs: [setup, build]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts/

      - name: Load build matrix
        id: matrix-info
        run: |
          echo '${{ needs.setup.outputs.matrix }}' > matrix.json

          # Names to purge from the run's artifact list once they're packed below
          names=$(jq -r '.[].artifact_name | . + "*"' matrix.json)
          echo "names<<MATRIX_EOF" >> "$GITHUB_OUTPUT"
          echo "$names" >> "$GITHUB_OUTPUT"
          echo "MATRIX_EOF" >> "$GITHUB_OUTPUT"

      - name: Delete downloaded artifacts
        uses: geekyeggo/delete-artifact@v6
        with:
          failOnError: false
          name: ${{ steps.matrix-info.outputs.names }}

      - name: Display downloaded artifacts
        run: |
          echo "::group::Downloaded Artifacts"
          find artifacts/ -type f -name "*.py" -o -name "*.so" -o -name "*.dylib" -o -name "*.pyd" | head -20
          echo "::endgroup::"

      - name: Create artifact structure
        run: |
          mkdir -p packed/radarsimpy_ubuntu_cpu_all

          # Build artifact_name -> ubuntu_version lookup table from the matrix
          declare -A ubuntu_version_for
          while IFS=$'\t' read -r name ver; do
            ubuntu_version_for["$name"]="$ver"
          done < <(jq -r '.[] | [.artifact_name, .ubuntu_version] | @tsv' matrix.json)

          # Copy each artifact to its matrix-defined directory
          for dir in artifacts/*/; do
            if [ -d "$dir" ]; then
              artifact_name=$(basename "$dir")
              echo "Processing artifact: $artifact_name"

              ver="${ubuntu_version_for[$artifact_name]}"
              if [ -z "$ver" ]; then
                echo "Unknown artifact $artifact_name, skipping"
                continue
              fi
              target_dir="temp/Ubuntu${ver}_x86_64_CPU/radarsimpy"

              mkdir -p "$target_dir"

              # Copy the radarsimpy module
              if [ -d "$dir/radarsimpy" ]; then
                echo "Copying radarsimpy module from $dir/radarsimpy to $target_dir/"
                cp -r "$dir/radarsimpy"/* "$target_dir/" 2>/dev/null || true
              else
                echo "Copying all contents from $dir to $target_dir/"
                cp -r "$dir"/* "$target_dir/" 2>/dev/null || true
              fi
            fi
          done

          # Create one zip and one tar.gz per Ubuntu version actually produced
          cd temp
          for combo_dir in */; do
            combo_dir="${combo_dir%/}"
            zip -r "../packed/radarsimpy_ubuntu_cpu_all/${combo_dir}.zip" "$combo_dir/"
            tar -czf "../packed/radarsimpy_ubuntu_cpu_all/${combo_dir}.tar.gz" "$combo_dir/"
          done
          cd ..

      - name: Verify artifact structure
        run: |
          echo "::group::Artifact Structure Verification"
          echo "Final directory structure:"
          find packed/radarsimpy_ubuntu_cpu_all -type f | sort
          echo ""
          echo "Zip and tar.gz files created:"
          ls -la packed/radarsimpy_ubuntu_cpu_all/*.zip packed/radarsimpy_ubuntu_cpu_all/*.tar.gz
          echo "::endgroup::"

      - name: Create README for packed artifacts
        run: |
          # ver/gcc pairs, one per unique Ubuntu version, sorted ascending
          ubuntu_info=$(jq -r '
            [.[] | {ver: .ubuntu_version, gcc: (.c_compiler | sub("gcc-";""))}]
            | unique_by(.ver) | sort_by(.ver | tonumber) | .[] | "\(.ver) \(.gcc)"
          ' matrix.json)
          total_builds=$(jq 'length' matrix.json)
          num_versions=$(echo "$ubuntu_info" | wc -l)
          python_versions=$(jq -r '[.[]."python-version"] | unique | join(", ")' matrix.json)

          {
            echo "# RadarSimPy Ubuntu Build Artifacts"
            echo
            echo "This archive contains all RadarSimPy builds for Ubuntu platforms organized by version."
            echo
            echo "## Directory Structure"
            echo
            echo "The builds are organized in the following structure:"
            echo
            echo '```'
            echo "radarsimpy_ubuntu_cpu_all/"
            while read -r ver gcc; do
              echo "├── Ubuntu${ver}_x86_64_CPU.zip"
              echo "├── Ubuntu${ver}_x86_64_CPU.tar.gz"
            done <<< "$ubuntu_info"
            echo '```'
            echo
            echo "## Version Information"
            while read -r ver gcc; do
              echo
              echo "### Ubuntu${ver}_x86_64_CPU (Ubuntu ${ver}.04 LTS)"
              echo "- Built with GCC-${gcc} compiler"
              echo "- Available in both ZIP and tar.gz formats"
              echo "- Each archive contains the complete radarsimpy module with all Python versions supported"
            done <<< "$ubuntu_info"
            echo
            echo "## Build Information"
            echo
            echo "- **Total Builds**: ${total_builds} (packaged into $((num_versions * 2)) files: ${num_versions} ZIP + ${num_versions} tar.gz)"
            echo "- **Ubuntu Versions**: $(echo "$ubuntu_info" | awk '{printf "%s.04 LTS, ", $1}' | sed 's/, $//')"
            echo "- **Architecture**: x86_64"
            echo "- **Python Versions**: ${python_versions}"
            echo "- **Formats**: ZIP and tar.gz for maximum compatibility"
            echo "- **Build Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
            echo
            echo "## Usage"
            echo
            echo "1. Extract the main archive"
            echo "2. Extract the appropriate Ubuntu version file (choose ZIP or tar.gz based on your preference)"
            echo "3. The radarsimpy module will be ready for use"
          } > packed/radarsimpy_ubuntu_cpu_all/README.md

      - name: Create compressed archive
        run: |
          cd packed
          tar -czf radarsimpy_ubuntu_cpu_all_builds.tar.gz radarsimpy_ubuntu_cpu_all/

          # Create zip version as well
          zip -r radarsimpy_ubuntu_cpu_all_builds.zip radarsimpy_ubuntu_cpu_all/

          echo "::group::Archive Information"
          ls -lh *.tar.gz *.zip
          echo "::endgroup::"

      - name: Upload packed artifacts
        uses: actions/upload-artifact@v6
        with:
          name: radarsimpy_ubuntu_cpu_all_builds
          path: |
            packed/radarsimpy_ubuntu_cpu_all_builds.tar.gz
            packed/radarsimpy_ubuntu_cpu_all_builds.zip
          retention-days: 1
          compression-level: 0

  # Summary job that runs after all builds complete
  build-summary:
    needs: [setup, build, pack-artifacts]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate build summary
        run: |
          echo '${{ needs.setup.outputs.matrix }}' > matrix.json
          total_builds=$(jq 'length' matrix.json)
          ubuntu_versions=$(jq -r '[.[].ubuntu_version] | unique | .[]' matrix.json)
          num_versions=$(echo "$ubuntu_versions" | wc -l)
          python_versions=$(jq -r '[.[]."python-version"] | unique | join(", ")' matrix.json)
          num_python=$(jq -r '[.[]."python-version"] | unique | length' matrix.json)

          echo "# Ubuntu Build Summary 📊" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Matrix Results" >> $GITHUB_STEP_SUMMARY
          echo "Total builds: ${total_builds} (${num_python} Python versions × ${num_versions} Ubuntu versions)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Ubuntu Version Distribution" >> $GITHUB_STEP_SUMMARY
          while read -r ver; do
            gcc=$(jq -r --arg v "$ver" '[.[] | select(.ubuntu_version == $v) | .c_compiler] | first' matrix.json)
            count=$(jq -r --arg v "$ver" '[.[] | select(.ubuntu_version == $v)] | length' matrix.json)
            echo "- **Ubuntu ${ver}.04 LTS**: ${count} builds with ${gcc}" >> $GITHUB_STEP_SUMMARY
          done <<< "$ubuntu_versions"
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Python Versions" >> $GITHUB_STEP_SUMMARY
          echo "- Python ${python_versions}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Packed Artifacts" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.pack-artifacts.result }}" == "success" ]; then
            echo "✅ **All artifacts successfully packed into ZIP and tar.gz files**" >> $GITHUB_STEP_SUMMARY
            echo "- Archive: \`radarsimpy_ubuntu_cpu_all_builds\`" >> $GITHUB_STEP_SUMMARY
            echo "- Formats: tar.gz, zip" >> $GITHUB_STEP_SUMMARY
            echo "- Structure: $((num_versions * 2)) files (${num_versions} Ubuntu versions × 2 formats)" >> $GITHUB_STEP_SUMMARY
            echo "- Contains: All ${total_builds} build variants organized by Ubuntu version" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Artifact packing failed or was skipped**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Status" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ **All builds completed successfully!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Some builds may have failed. Check individual job logs for details.**" >> $GITHUB_STEP_SUMMARY
          fi

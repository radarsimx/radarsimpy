name: Release on MacOS

# GitHub Actions workflow for building and packaging RadarSimPy on macOS platforms.
#
# This workflow builds RadarSimPy across multiple macOS versions and Python versions.
# It supports both Intel x64 and Apple Silicon ARM64 architectures to provide
# comprehensive macOS coverage.
#
# Build Matrix:
# - Defined once, as JSON, in the `setup` job's "Define build matrix" step.
#   The `build`, `pack-artifacts`, and `build-summary` jobs all consume it via
#   job outputs, so adding/removing a macOS architecture or Python version only
#   requires editing that one step — no other job needs to change.
# - macOS 26 (Intel x64): Clang compiler, 5 builds (5 Python)
# - macOS 26 (Apple Silicon ARM64): Clang compiler, 5 builds (5 Python)
# - Python versions: 3.10, 3.11, 3.12, 3.13, 3.14
# - Total builds: 10
#
# Features:
# - Comprehensive caching (pip, Homebrew, ccache)
# - Build optimization with ccache
# - Xcode version management
# - Artifact verification and validation
# - Multi-architecture artifact packing
# - Detailed build reporting and summaries
# - Error handling with build log uploads
#
# Outputs:
# - Individual artifacts for each build configuration
# - Packed archive containing all builds organized by architecture
# - Build summaries and statistics
#
# Triggers:
# - Tag pushes (release events)
# - Manual workflow dispatch

on:
  push:
    tags:
      - "*"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

env:
  # Global environment variables
  PYTHONUNBUFFERED: 1
  PYTHONDONTWRITEBYTECODE: 1

jobs:
  # Single source of truth for the build matrix. Every other job reads this
  # instead of hardcoding macOS architectures/Python versions.
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Define build matrix
        id: set-matrix
        run: |
          cat > matrix.json << 'EOF'
          [
            { "os": "macos-26-intel", "python-version": "3.10", "c_compiler": "clang", "cxx_compiler": "clang++", "xcode_version": "26.4.1", "arch": "cpu", "dir_label": "x86_64", "platform_name": "Intel", "artifact_name": "radarsimpy_macos_py3.10" },
            { "os": "macos-26-intel", "python-version": "3.11", "c_compiler": "clang", "cxx_compiler": "clang++", "xcode_version": "26.4.1", "arch": "cpu", "dir_label": "x86_64", "platform_name": "Intel", "artifact_name": "radarsimpy_macos_py3.11" },
            { "os": "macos-26-intel", "python-version": "3.12", "c_compiler": "clang", "cxx_compiler": "clang++", "xcode_version": "26.4.1", "arch": "cpu", "dir_label": "x86_64", "platform_name": "Intel", "artifact_name": "radarsimpy_macos_py3.12" },
            { "os": "macos-26-intel", "python-version": "3.13", "c_compiler": "clang", "cxx_compiler": "clang++", "xcode_version": "26.4.1", "arch": "cpu", "dir_label": "x86_64", "platform_name": "Intel", "artifact_name": "radarsimpy_macos_py3.13" },
            { "os": "macos-26-intel", "python-version": "3.14", "c_compiler": "clang", "cxx_compiler": "clang++", "xcode_version": "26.4.1", "arch": "cpu", "dir_label": "x86_64", "platform_name": "Intel", "artifact_name": "radarsimpy_macos_py3.14" },
            { "os": "macos-26", "python-version": "3.10", "c_compiler": "clang", "cxx_compiler": "clang++", "xcode_version": "26.4.1", "arch": "cpu", "dir_label": "ARM", "platform_name": "Apple Silicon", "artifact_name": "radarsimpy_macos_arm_py3.10" },
            { "os": "macos-26", "python-version": "3.11", "c_compiler": "clang", "cxx_compiler": "clang++", "xcode_version": "26.4.1", "arch": "cpu", "dir_label": "ARM", "platform_name": "Apple Silicon", "artifact_name": "radarsimpy_macos_arm_py3.11" },
            { "os": "macos-26", "python-version": "3.12", "c_compiler": "clang", "cxx_compiler": "clang++", "xcode_version": "26.4.1", "arch": "cpu", "dir_label": "ARM", "platform_name": "Apple Silicon", "artifact_name": "radarsimpy_macos_arm_py3.12" },
            { "os": "macos-26", "python-version": "3.13", "c_compiler": "clang", "cxx_compiler": "clang++", "xcode_version": "26.4.1", "arch": "cpu", "dir_label": "ARM", "platform_name": "Apple Silicon", "artifact_name": "radarsimpy_macos_arm_py3.13" },
            { "os": "macos-26", "python-version": "3.14", "c_compiler": "clang", "cxx_compiler": "clang++", "xcode_version": "26.4.1", "arch": "cpu", "dir_label": "ARM", "platform_name": "Apple Silicon", "artifact_name": "radarsimpy_macos_arm_py3.14" }
          ]
          EOF
          echo "matrix=$(jq -c . matrix.json)" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ssh-key: ${{secrets.RADARSIMC}}
          submodules: recursive
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode_version }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Cache build dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/Library/Caches/Homebrew
            ~/.ccache
          key: ${{ runner.os }}-${{ matrix.os }}-${{ matrix.python-version }}-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.os }}-${{ matrix.python-version }}-
            ${{ runner.os }}-${{ matrix.os }}-${{ matrix.python-version }}-
            ${{ runner.os }}-${{ matrix.os }}-

      - name: Install system dependencies
        run: |
          # Install ccache for faster compilation
          brew install ccache
          echo "$(brew --prefix ccache)/bin" >> $GITHUB_PATH

          # Set up ccache
          ccache --set-config=max_size=2G
          ccache --set-config=cache_dir=~/.ccache

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -r requirements-dev.txt

      - name: Display build information
        run: |
          echo "::group::Build Information"
          echo "OS: ${{ matrix.os }}"
          echo "Python: ${{ matrix.python-version }}"
          echo "Architecture: ${{ matrix.arch }}"
          echo "C Compiler: ${{ matrix.c_compiler }}"
          echo "C++ Compiler: ${{ matrix.cxx_compiler }}"
          echo "Xcode Version: ${{ matrix.xcode_version }}"
          echo "::endgroup::"

          echo "::group::System Information"
          uname -a
          sw_vers
          xcodebuild -version
          python --version
          pip --version
          ${{ matrix.c_compiler }} --version
          ${{ matrix.cxx_compiler }} --version
          echo "::endgroup::"

      - name: Build RadarSimPy
        env:
          CC: ${{ matrix.c_compiler }}
          CXX: ${{ matrix.cxx_compiler }}
          CCACHE_DIR: ~/.ccache
          CCACHE_COMPILERCHECK: content
        run: |
          echo "::group::Build Process"
          chmod +x build.sh
          ./build.sh --license=on --arch=${{ matrix.arch }} --test=off --verbose
          echo "::endgroup::"

      - name: Display build statistics
        if: always()
        run: |
          echo "::group::Build Statistics"
          ccache --show-stats
          echo "::endgroup::"

      - name: Verify build artifacts
        run: |
          echo "::group::Build Verification"
          ls -la ./radarsimpy/
          if [ -f "./radarsimpy/__init__.py" ]; then
            echo "✓ Python module found"
          else
            echo "✗ Python module missing"
            exit 1
          fi

          # Check for compiled extensions
          if find ./radarsimpy -name "*.so" -o -name "*.dylib" -o -name "*.pyd" | grep -q .; then
            echo "✓ Compiled extensions found:"
            find ./radarsimpy -name "*.so" -o -name "*.dylib" -o -name "*.pyd"
          else
            echo "✗ No compiled extensions found"
            exit 1
          fi
          echo "::endgroup::"

      - name: Archive built module
        uses: actions/upload-artifact@v6
        if: success()
        with:
          name: ${{ matrix.artifact_name }}
          path: ./radarsimpy
          retention-days: 1
          compression-level: 6

      - name: Upload build logs on failure
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: build-logs-${{ matrix.artifact_name }}
          path: |
            ./build_logs/
            *.log
          retention-days: 1

  # Pack all artifacts into a single file
  pack-artifacts:
    needs: [setup, build]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts/

      - name: Load build matrix
        id: matrix-info
        run: |
          echo '${{ needs.setup.outputs.matrix }}' > matrix.json

          # Names to purge from the run's artifact list once they're packed below
          names=$(jq -r '.[].artifact_name | . + "*"' matrix.json)
          echo "names<<MATRIX_EOF" >> "$GITHUB_OUTPUT"
          echo "$names" >> "$GITHUB_OUTPUT"
          echo "MATRIX_EOF" >> "$GITHUB_OUTPUT"

      - name: Delete downloaded artifacts
        uses: geekyeggo/delete-artifact@v6
        with:
          failOnError: false
          name: ${{ steps.matrix-info.outputs.names }}

      - name: Display downloaded artifacts
        run: |
          echo "::group::Downloaded Artifacts"
          find artifacts/ -type f -name "*.py" -o -name "*.so" -o -name "*.dylib" -o -name "*.pyd" | head -20
          echo "::endgroup::"

      - name: Create artifact structure
        run: |
          mkdir -p packed/radarsimpy_macos_all

          # Build artifact_name -> dir_label lookup table from the matrix
          declare -A dir_label_for
          while IFS=$'\t' read -r name label; do
            dir_label_for["$name"]="$label"
          done < <(jq -r '.[] | [.artifact_name, .dir_label] | @tsv' matrix.json)

          # Copy each artifact to its matrix-defined directory
          for dir in artifacts/*/; do
            if [ -d "$dir" ]; then
              artifact_name=$(basename "$dir")
              echo "Processing artifact: $artifact_name"

              label="${dir_label_for[$artifact_name]}"
              if [ -z "$label" ]; then
                echo "Unknown artifact $artifact_name, skipping"
                continue
              fi
              target_dir="temp/MacOS_${label}_CPU/radarsimpy"

              mkdir -p "$target_dir"

              # Copy the radarsimpy module
              if [ -d "$dir/radarsimpy" ]; then
                echo "Copying radarsimpy module from $dir/radarsimpy to $target_dir/"
                cp -r "$dir/radarsimpy"/* "$target_dir/" 2>/dev/null || true
              else
                echo "Copying all contents from $dir to $target_dir/"
                cp -r "$dir"/* "$target_dir/" 2>/dev/null || true
              fi
            fi
          done

          # Create one zip and one tar.gz per architecture actually produced
          cd temp
          for combo_dir in */; do
            combo_dir="${combo_dir%/}"
            zip -r "../packed/radarsimpy_macos_all/${combo_dir}.zip" "$combo_dir/"
            tar -czf "../packed/radarsimpy_macos_all/${combo_dir}.tar.gz" "$combo_dir/"
          done
          cd ..

      - name: Verify artifact structure
        run: |
          echo "::group::Artifact Structure Verification"
          echo "Final directory structure:"
          find packed/radarsimpy_macos_all -type f | sort
          echo ""
          echo "Zip and tar.gz files created:"
          ls -la packed/radarsimpy_macos_all/*.zip packed/radarsimpy_macos_all/*.tar.gz
          echo "::endgroup::"

      - name: Create README for packed artifacts
        run: |
          total_builds=$(jq 'length' matrix.json)
          arch_info=$(jq -r '[.[] | {label: .dir_label, name: .platform_name}] | unique_by(.label) | .[] | "\(.label)|\(.name)"' matrix.json)
          num_archs=$(echo "$arch_info" | wc -l)
          python_versions=$(jq -r '[.[]."python-version"] | unique | join(", ")' matrix.json)
          names=$(echo "$arch_info" | awk -F'|' '{print "MacOS_"$1"_CPU.zip"}')
          n=$(echo "$names" | wc -l)

          {
            echo "# RadarSimPy macOS Build Artifacts"
            echo
            echo "This archive contains all RadarSimPy builds for macOS platforms organized by architecture."
            echo
            echo "## Directory Structure"
            echo
            echo "The builds are organized in the following structure:"
            echo
            echo '```'
            echo "radarsimpy_macos_all/"
            i=0
            while IFS='|' read -r label name; do
              i=$((i+1))
              if [ "$i" -eq "$n" ]; then
                echo "└── MacOS_${label}_CPU.zip"
                echo "└── MacOS_${label}_CPU.tar.gz"
              else
                echo "├── MacOS_${label}_CPU.zip"
                echo "├── MacOS_${label}_CPU.tar.gz"
              fi
            done <<< "$arch_info"
            echo '```'
            echo
            echo "## Architecture Information"
            while IFS='|' read -r label name; do
              echo
              echo "### MacOS_${label}_CPU (${name}-based Macs)"
              echo "- Built on macOS 26 with Clang compiler"
              echo "- Available in both ZIP and tar.gz formats"
              echo "- Each archive contains the complete radarsimpy module with all Python versions supported"
            done <<< "$arch_info"
            echo
            echo "## Build Information"
            echo
            echo "- **Total Builds**: ${total_builds} (packaged into $((num_archs * 2)) files: ${num_archs} ZIP + ${num_archs} tar.gz)"
            echo "- **Architectures**: $(echo "$arch_info" | awk -F'|' '{printf "%s (%s), ", $1, $2}' | sed 's/, $//')"
            echo "- **Python Versions**: ${python_versions}"
            echo "- **Formats**: ZIP and tar.gz for maximum compatibility"
            echo "- **Build Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
            echo
            echo "## Usage"
            echo
            echo "1. Extract the main archive"
            echo "2. Extract the appropriate architecture file (choose ZIP or tar.gz based on your preference)"
            echo "3. The radarsimpy module will be ready for use"
          } > packed/radarsimpy_macos_all/README.md

      - name: Create compressed archive
        run: |
          cd packed
          tar -czf radarsimpy_macos_all_builds.tar.gz radarsimpy_macos_all/

          # Create zip version as well
          zip -r radarsimpy_macos_all_builds.zip radarsimpy_macos_all/

          echo "::group::Archive Information"
          ls -lh *.tar.gz *.zip
          echo "::endgroup::"

      - name: Upload packed artifacts
        uses: actions/upload-artifact@v6
        with:
          name: radarsimpy_macos_all_builds
          path: |
            packed/radarsimpy_macos_all_builds.tar.gz
            packed/radarsimpy_macos_all_builds.zip
          retention-days: 1
          compression-level: 0

  # Summary job that runs after all builds complete
  build-summary:
    needs: [setup, build, pack-artifacts]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate build summary
        run: |
          echo '${{ needs.setup.outputs.matrix }}' > matrix.json
          total_builds=$(jq 'length' matrix.json)
          arch_info=$(jq -r '[.[] | {label: .dir_label, name: .platform_name, os: .os}] | unique_by(.label) | .[] | "\(.label)|\(.name)|\(.os)"' matrix.json)
          python_versions=$(jq -r '[.[]."python-version"] | unique | join(", ")' matrix.json)
          num_python=$(jq -r '[.[]."python-version"] | unique | length' matrix.json)

          echo "# macOS Build Summary 🍎" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Matrix Results" >> $GITHUB_STEP_SUMMARY
          echo "Total builds: ${total_builds} (${num_python} Python versions × $(echo "$arch_info" | wc -l) architectures)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Architecture Distribution" >> $GITHUB_STEP_SUMMARY
          while IFS='|' read -r label name os; do
            count=$(jq -r --arg l "$label" '[.[] | select(.dir_label == $l)] | length' matrix.json)
            echo "- **${label} (${name})**: ${count} builds on ${os} with Clang" >> $GITHUB_STEP_SUMMARY
          done <<< "$arch_info"
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Python Versions" >> $GITHUB_STEP_SUMMARY
          echo "- Python ${python_versions}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Packed Artifacts" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.pack-artifacts.result }}" == "success" ]; then
            num_archs=$(echo "$arch_info" | wc -l)
            echo "✅ **All artifacts successfully packed into ZIP and tar.gz files by architecture**" >> $GITHUB_STEP_SUMMARY
            echo "- Archive: \`radarsimpy_macos_all_builds\`" >> $GITHUB_STEP_SUMMARY
            echo "- Formats: tar.gz, zip" >> $GITHUB_STEP_SUMMARY
            echo "- Structure: $((num_archs * 2)) files (${num_archs} architectures × 2 formats)" >> $GITHUB_STEP_SUMMARY
            echo "- Contains: All ${total_builds} build variants organized by architecture" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Artifact packing failed or was skipped**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Status" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ **All macOS builds completed successfully!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Some builds may have failed. Check individual job logs for details.**" >> $GITHUB_STEP_SUMMARY
          fi

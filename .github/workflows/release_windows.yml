name: Release on Windows

# GitHub Actions workflow for building and packaging RadarSimPy on Windows platforms.
#
# This workflow builds RadarSimPy for Windows x64 architecture across multiple Python
# versions. It uses the latest Windows runner with MSVC compiler and provides
# comprehensive Windows-specific optimizations.
#
# Build Matrix:
# - Defined once, as JSON, in the `setup` job's "Define build matrix" step.
#   The `build`, `pack-artifacts`, and `build-summary` jobs all consume it via
#   job outputs, so adding/removing a Python version only requires editing that
#   one step — no other job needs to change.
# - Windows x64: MSVC compiler, 5 builds (5 Python versions)
# - Python versions: 3.10, 3.11, 3.12, 3.13, 3.14
# - Total builds: 5
#
# Features:
# - Comprehensive caching (pip)
# - Windows-specific dependency management
# - Artifact verification and validation
# - Windows-native artifact packing
# - Detailed build reporting and summaries
# - Error handling with build log uploads
# - PowerShell and CMD integration
#
# Outputs:
# - Individual artifacts for each build configuration
# - Packed ZIP archive containing all builds
# - Build summaries and statistics
#
# Triggers:
# - Tag pushes (release events)
# - Manual workflow dispatch

on:
  push:
    tags:
      - "*"
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

env:
  # Global environment variables
  PYTHONUNBUFFERED: 1
  PYTHONDONTWRITEBYTECODE: 1

jobs:
  # Single source of truth for the build matrix. Every other job reads this
  # instead of hardcoding Python versions.
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Define build matrix
        id: set-matrix
        run: |
          cat > matrix.json << 'EOF'
          [
            { "python-version": "3.10", "arch": "cpu", "artifact_name": "radarsimpy_windows_py3.10" },
            { "python-version": "3.11", "arch": "cpu", "artifact_name": "radarsimpy_windows_py3.11" },
            { "python-version": "3.12", "arch": "cpu", "artifact_name": "radarsimpy_windows_py3.12" },
            { "python-version": "3.13", "arch": "cpu", "artifact_name": "radarsimpy_windows_py3.13" },
            { "python-version": "3.14", "arch": "cpu", "artifact_name": "radarsimpy_windows_py3.14" }
          ]
          EOF
          echo "matrix=$(jq -c . matrix.json)" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    runs-on: windows-2025
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ssh-key: ${{secrets.RADARSIMC}}
          submodules: recursive
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Cache build dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.python-version }}-
            ${{ runner.os }}-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -r requirements-dev.txt

      - name: Display build information
        run: |
          echo "::group::Build Information"
          echo "OS: windows-latest"
          echo "Python: ${{ matrix.python-version }}"
          echo "Architecture: ${{ matrix.arch }}"
          echo "::endgroup::"

          echo "::group::System Information"
          systeminfo | findstr /C:"OS Name" /C:"OS Version"
          python --version
          pip --version
          echo "::endgroup::"
        shell: cmd

      - name: Build RadarSimPy
        run: |
          echo "::group::Build Process"
          .\build.bat --license=on --arch=${{ matrix.arch }} --test=off
          echo "::endgroup::"
        shell: cmd

      - name: Verify build artifacts
        run: |
          echo "::group::Build Verification"
          dir /s .\radarsimpy\
          if exist ".\radarsimpy\__init__.py" (
            echo "✓ Python module found"
          ) else (
            echo "✗ Python module missing"
            exit /b 1
          )

          # Check for compiled extensions
          dir /s .\radarsimpy\*.pyd >nul 2>&1
          if %errorlevel% == 0 (
            echo "✓ Compiled extensions found:"
            dir /s .\radarsimpy\*.pyd
          ) else (
            echo "✗ No compiled extensions found"
            exit /b 1
          )
          echo "::endgroup::"
        shell: cmd

      - name: Archive built module
        uses: actions/upload-artifact@v6
        if: success()
        with:
          name: ${{ matrix.artifact_name }}
          path: .\radarsimpy
          retention-days: 1
          compression-level: 6

      - name: Upload build logs on failure
        uses: actions/upload-artifact@v6
        if: failure()
        with:
          name: build-logs-${{ matrix.artifact_name }}
          path: |
            .\build_logs\
            *.log
          retention-days: 1

  # Pack all artifacts into a single file
  pack-artifacts:
    needs: [setup, build]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts/

      - name: Load build matrix
        id: matrix-info
        run: |
          echo '${{ needs.setup.outputs.matrix }}' > matrix.json

          # Names to purge from the run's artifact list once they're packed below
          names=$(jq -r '.[].artifact_name | . + "*"' matrix.json)
          echo "names<<MATRIX_EOF" >> "$GITHUB_OUTPUT"
          echo "$names" >> "$GITHUB_OUTPUT"
          echo "MATRIX_EOF" >> "$GITHUB_OUTPUT"

      - name: Delete downloaded artifacts
        uses: geekyeggo/delete-artifact@v6
        with:
          failOnError: false
          name: ${{ steps.matrix-info.outputs.names }}

      - name: Display downloaded artifacts
        run: |
          echo "::group::Downloaded Artifacts"
          find artifacts/ -type f -name "*.py" -o -name "*.pyd" -o -name "*.dll" | head -20
          echo "::endgroup::"

      - name: Create artifact structure
        run: |
          mkdir -p packed/radarsimpy_windows_cpu_all

          # Create temporary directory for building package
          mkdir -p temp/radarsimpy

          # Process each artifact directory
          for dir in artifacts/*/; do
            if [ -d "$dir" ]; then
              artifact_name=$(basename "$dir")
              echo "Processing artifact: $artifact_name"

              temp_dir="temp/radarsimpy"
              echo "Target temp directory: $temp_dir"

              # Copy the radarsimpy module to temp directory
              source_radarsimpy="$dir/radarsimpy"
              if [ -d "$source_radarsimpy" ]; then
                echo "Copying radarsimpy module from $source_radarsimpy to $temp_dir"
                cp -r "$source_radarsimpy"/* "$temp_dir/" 2>/dev/null || true
              else
                echo "Copying all contents from $dir to $temp_dir"
                cp -r "$dir"/* "$temp_dir/" 2>/dev/null || true
              fi
            fi
          done

          # Create ZIP file
          echo "Creating Windows_x86_64_CPU.zip..."
          cd temp && zip -r ../packed/radarsimpy_windows_cpu_all/Windows_x86_64_CPU.zip . && cd ..

      - name: Verify artifact structure
        run: |
          echo "::group::Artifact Structure Verification"
          echo "Final directory structure:"
          find packed/radarsimpy_windows_cpu_all -type f | sort

          echo ""
          echo "Verifying ZIP file exists:"
          if [ -f "packed/radarsimpy_windows_cpu_all/Windows_x86_64_CPU.zip" ]; then
            echo "✓ Windows_x86_64_CPU.zip found"
          else
            echo "✗ Windows_x86_64_CPU.zip missing"
            exit 1
          fi
          echo "::endgroup::"

      - name: Create README for packed artifacts
        run: |
          total_builds=$(jq 'length' matrix.json)
          python_versions=$(jq -r '[.[]."python-version"] | unique | join(", ")' matrix.json)

          {
            echo "# RadarSimPy Windows Build Artifacts"
            echo
            echo "This archive contains all RadarSimPy builds for Windows platforms."
            echo
            echo "## Directory Structure"
            echo
            echo "The builds are organized in the following structure:"
            echo
            echo '```'
            echo "radarsimpy_windows_cpu_all/"
            echo "└── Windows_x86_64_CPU.zip"
            echo '```'
            echo
            echo "## Build Information"
            echo
            echo "### Windows_x86_64_CPU.zip (Windows x64)"
            echo "- Built on Windows with MSVC compiler"
            echo "- Contains the complete radarsimpy module with all Python versions supported"
            echo "- Built with license features enabled"
            echo
            echo "## Build Details"
            echo
            echo "- **Total Builds**: ${total_builds} (packaged into 1 ZIP file)"
            echo "- **Architecture**: x64"
            echo "- **Python Versions**: ${python_versions}"
            echo "- **Build Date**: $(date)"
            echo
            echo "## Usage"
            echo
            echo "1. Extract the main archive"
            echo "2. Extract the Windows_x86_64_CPU.zip file"
            echo "3. The radarsimpy module will be ready for use"
          } > packed/radarsimpy_windows_cpu_all/README.md

      - name: Create compressed archive
        run: |
          cd packed
          zip -r radarsimpy_windows_cpu_all_builds.zip radarsimpy_windows_cpu_all/

          echo "::group::Archive Information"
          ls -lh *.zip
          echo "::endgroup::"

      - name: Upload packed artifacts
        uses: actions/upload-artifact@v6
        with:
          name: radarsimpy_windows_cpu_all_builds
          path: packed/radarsimpy_windows_cpu_all_builds.zip
          retention-days: 1
          compression-level: 0

  # Summary job that runs after all builds complete
  build-summary:
    needs: [setup, build, pack-artifacts]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate build summary
        run: |
          echo '${{ needs.setup.outputs.matrix }}' > matrix.json
          total_builds=$(jq 'length' matrix.json)
          python_versions=$(jq -r '[.[]."python-version"] | unique | join(", ")' matrix.json)

          echo "# Windows Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Matrix Results" >> $GITHUB_STEP_SUMMARY
          echo "Total builds: ${total_builds} [${total_builds} Python versions]" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Architecture Distribution" >> $GITHUB_STEP_SUMMARY
          echo "- **Windows x64**: ${total_builds} builds on windows-2025" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Python Versions" >> $GITHUB_STEP_SUMMARY
          echo "- Python ${python_versions}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Packed Artifacts" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.pack-artifacts.result }}" == "success" ]; then
            echo "✅ **All artifacts successfully packed into ZIP file**" >> $GITHUB_STEP_SUMMARY
            echo "- Archive: \`radarsimpy_windows_cpu_all_builds\`" >> $GITHUB_STEP_SUMMARY
            echo "- Format: zip" >> $GITHUB_STEP_SUMMARY
            echo "- Structure: Windows_x86_64_CPU.zip" >> $GITHUB_STEP_SUMMARY
            echo "- Contains: All ${total_builds} build variants with license features enabled" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Artifact packing failed or was skipped**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Status" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ **All builds completed successfully!**" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Some builds may have failed. Check individual job logs for details.**" >> $GITHUB_STEP_SUMMARY
          fi
